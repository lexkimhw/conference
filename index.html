<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>렉스김어학원 간담회 예약 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; word-break: keep-all; }
        .step-inactive { opacity: 0.2; pointer-events: none; filter: grayscale(1); transition: all 0.4s; }
        .time-slot { transition: all 0.2s; border: 1px solid #e2e8f0; }
        .available { background-color: #f8fafc; cursor: pointer; color: #1e293b; }
        .available:hover { background-color: #1e3a8a; color: white; border-color: #1e3a8a; }
        .reserved { background-color: #cbd5e1 !important; color: #94a3b8 !important; cursor: not-allowed !important; }
        .timeline-bar { height: 18px; display: flex; border-radius: 4px; overflow: hidden; background: #f1f5f9; border: 1px solid #e2e8f0; }
        .timeline-cell { flex: 1; height: 100%; border-right: 1px solid rgba(255,255,255,0.2); }
        .cell-reserved { background-color: #ef4444; }
        .cell-free { background-color: #10b981; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-40">

    <header class="bg-blue-900 text-white p-5 shadow-xl flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-xl font-black tracking-tighter">LEX KIM ACADEMY</h1>
        <div class="flex gap-2">
            <button onclick="location.reload()" class="text-[10px] font-bold bg-white/10 px-3 py-1.5 rounded-full text-white">새로고침</button>
            <button onclick="openAdmin()" class="text-[10px] font-bold bg-white/10 px-3 py-1.5 rounded-full text-white">ADMIN</button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-6">
        <section class="mb-10">
            <h2 class="text-xs font-black text-blue-900 mb-4 uppercase tracking-widest">01. 간담회 일정 선택</h2>
            <div id="dateList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </section>

        <section id="step2Section" class="mb-10 step-inactive">
            <h2 class="text-xs font-black text-blue-900 mb-4 uppercase tracking-widest">02. 학생 정보 입력 (레벨은 영문 대문자만)</h2>
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 grid grid-cols-1 md:grid-cols-3 gap-6 mb-4">
                <input type="text" id="stuLevel" oninput="this.value = this.value.toUpperCase().replace(/[^A-Z]/g, ''); checkStep2();" placeholder="LEVEL (예: KA)" class="border-b-2 border-slate-100 p-2 outline-none focus:border-blue-900 font-bold text-lg text-center">
                <input type="text" id="stuKrName" oninput="checkStep2()" placeholder="학생 이름" class="border-b-2 border-slate-100 p-2 outline-none focus:border-blue-900 font-bold text-lg text-center">
                <input type="tel" id="parentPhone" oninput="checkStep2()" placeholder="연락처 (-제외)" class="border-b-2 border-slate-100 p-2 outline-none focus:border-blue-900 font-bold text-lg text-center">
            </div>
            
            <div id="existingReservation" class="hidden animate-pulse bg-blue-50 border border-blue-200 p-5 rounded-2xl">
                <div class="text-blue-900 font-bold text-sm mb-2">💡 이미 예약된 정보가 있습니다.</div>
                <div id="existingDetails" class="text-xs text-slate-600 space-y-1"></div>
            </div>
        </section>

        <section id="step3Section" class="mb-10 step-inactive">
            <h2 class="text-xs font-black text-blue-900 mb-4 uppercase tracking-widest">03. 상담 선생님 선택</h2>
            <div id="teacherList" class="grid grid-cols-2 md:grid-cols-3 gap-3"></div>
        </section>

        <section id="step4Section" class="bg-slate-900 p-8 rounded-[2rem] shadow-2xl mb-10 hidden">
            <div id="timeGrid" class="grid grid-cols-4 md:grid-cols-8 gap-2"></div>
        </section>
    </main>

    <div id="adminModal" class="fixed inset-0 bg-slate-900/95 hidden z-[100] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-5xl h-[90vh] rounded-[2.5rem] overflow-hidden flex flex-col">
            <div class="p-6 border-b flex justify-between items-center shrink-0">
                <h2 class="text-xl font-black italic text-blue-900">ADMIN PANEL</h2>
                <button onclick="closeAdmin()" class="text-3xl">&times;</button>
            </div>
            <div id="adminContent" class="p-8 overflow-y-auto space-y-10">
                <div id="timelineSection">
                    <h3 class="font-black mb-4">📊 실시간 예약 현황</h3>
                    <div id="adminTimeline" class="space-y-2 bg-slate-50 p-4 rounded-xl"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://lexkimhw-63c3b-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let selection = { date: '', level: '', krName: '', parentPhone: '', items: [] };
        let currentEditKey = null; // 수정을 위한 키 저장

        function initApp() {
            // 회차 불러오기
            db.ref('settings/dates').on('value', snap => {
                const dates = snap.val() || {};
                const container = document.getElementById('dateList');
                container.innerHTML = '';
                Object.keys(dates).forEach(key => {
                    const d = dates[key];
                    const btn = document.createElement('button');
                    btn.className = "p-6 border-2 border-white rounded-3xl text-left bg-white shadow-sm";
                    btn.innerHTML = `<div class="font-black text-slate-800 text-xl">${d.name}</div><div class="text-xs text-slate-500 font-bold">${d.desc}</div>`;
                    btn.onclick = () => {
                        selection.date = d.name;
                        document.querySelectorAll('#dateList button').forEach(b => b.classList.remove('border-blue-900', 'bg-blue-50'));
                        btn.classList.add('border-blue-900', 'bg-blue-50');
                        document.getElementById('step2Section').classList.remove('step-inactive');
                        checkStep2();
                    };
                    container.appendChild(btn);
                });
            });

            // 선생님 데이터 미리 로드
            db.ref('settings/teachers').on('value', snap => { window.allTeachers = snap.val() || {}; });
        }

        // 기존 예약 확인 및 UI 활성화
        function checkStep2() {
            selection.level = document.getElementById('stuLevel').value.trim();
            selection.krName = document.getElementById('stuKrName').value.trim();
            selection.parentPhone = document.getElementById('parentPhone').value.trim();

            if (selection.level && selection.krName && selection.parentPhone) {
                // 기존 예약 여부 검색
                db.ref('appointments').once('value', snap => {
                    const data = snap.val() || {};
                    const found = Object.keys(data).find(key => 
                        data[key].level === selection.level && 
                        data[key].krName === selection.krName && 
                        data[key].parentPhone === selection.parentPhone
                    );

                    const noticeArea = document.getElementById('existingReservation');
                    const detailsArea = document.getElementById('existingDetails');

                    if (found) {
                        const reserve = data[found];
                        noticeArea.classList.remove('hidden');
                        detailsArea.innerHTML = `
                            <div><b>예약내역:</b> ${reserve.date} / ${reserve.items.map(i=>`${i.teacher}(${i.time})`).join(', ')}</div>
                            <button onclick="prepareEdit('${found}')" class="mt-2 bg-blue-900 text-white px-4 py-1.5 rounded-lg font-bold text-[11px]">다른 시간으로 수정하기</button>
                        `;
                    } else {
                        noticeArea.classList.add('hidden');
                    }
                });
                document.getElementById('step3Section').classList.remove('step-inactive');
                renderTeachers();
            }
        }

        // 수정 모드 준비
        function prepareEdit(key) {
            currentEditKey = key;
            db.ref(`appointments/${key}`).once('value', snap => {
                const data = snap.val();
                alert(`${data.krName} 학생의 예약을 수정 모드로 전환합니다. 아래에서 선생님과 시간을 다시 선택한 후 '예약 수정 확정'을 눌러주세요.`);
                // 수정 시 기존 회차로 자동 선택
                selection.date = data.date;
                renderTeachers();
                document.getElementById('step3Section').scrollIntoView({behavior:'smooth'});
            });
        }

        function renderTeachers() {
            const list = document.getElementById('teacherList');
            list.innerHTML = '';
            if(!selection.date) return;
            Object.values(window.allTeachers).forEach(t => {
                if(t.dateRef === selection.date) {
                    const btn = document.createElement('button');
                    btn.className = "p-5 rounded-2xl font-black text-sm border-2 bg-white text-slate-700 shadow-sm";
                    btn.innerHTML = `${t.name}<br><span class="text-[9px] opacity-60 font-normal">${t.levels.join(',')}</span>`;
                    btn.onclick = () => openSlots(t);
                    list.appendChild(btn);
                }
            });
        }

        function openSlots(teacher) {
            const s4 = document.getElementById('step4Section');
            s4.classList.remove('hidden');
            const grid = document.getElementById('timeGrid'); grid.innerHTML = '';
            
            let curr = new Date(); curr.setHours(10, 20, 0, 0);
            while(curr <= new Date().setHours(12, 55, 0, 0)) {
                const tStr = curr.toLocaleTimeString('ko-KR', { hour12: false, hour: '2-digit', minute: '2-digit' });
                const slot = document.createElement('button');
                slot.className = "time-slot p-2 text-center text-[10px] font-bold rounded-lg available text-white border-slate-700";
                slot.innerText = tStr;
                slot.onclick = () => {
                    const idx = selection.items.findIndex(i => i.teacher === teacher.name);
                    if(idx > -1) selection.items.splice(idx, 1);
                    if(selection.items.length >= 2) return alert("최대 2명까지 가능합니다.");
                    selection.items.push({ teacher: teacher.name, time: tStr });
                    s4.classList.add('hidden');
                    updateSummary();
                };
                grid.appendChild(slot);
                curr.setMinutes(curr.getMinutes() + 5);
            }
            // 실시간 예약 마감 체크
            db.ref('appointments').on('value', snap => {
                const data = snap.val() || {};
                document.querySelectorAll('.time-slot').forEach(slot => {
                    const isFull = Object.values(data).some(app => app.date === selection.date && app.items.some(i => i.teacher === teacher.name && i.time === slot.innerText));
                    if(isFull) slot.classList.add('reserved');
                });
            });
        }

        function updateSummary() {
            const sumText = `${selection.date} | ${selection.krName} | ${selection.items.map(i=>`${i.teacher}(${i.time})`).join(', ')}`;
            document.getElementById('selectionSummary').innerText = sumText;
            document.getElementById('submitBtn').innerText = currentEditKey ? "예약 수정 확정하기" : "예약 확정하기";
        }

        function submitReservation() {
            if(selection.items.length === 0) return alert("상담 시간을 선택해주세요.");
            
            if(currentEditKey) {
                // 수정 로직
                db.ref(`appointments/${currentEditKey}`).set(selection).then(() => {
                    alert("예약이 수정되었습니다.");
                    location.reload();
                });
            } else {
                // 신규 로직
                db.ref('appointments').push(selection).then(() => {
                    alert("예약이 완료되었습니다.");
                    location.reload();
                });
            }
        }

        function openAdmin() {
            if(prompt("관리자 암호") === '5556575') document.getElementById('adminModal').classList.remove('hidden');
        }
        function closeAdmin() { document.getElementById('adminModal').classList.add('hidden'); }

        initApp();
    </script>

    <div class="fixed bottom-0 left-0 right-0 bg-white/95 border-t p-6 z-40 shadow-2xl">
        <div class="max-w-4xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div id="selectionSummary" class="text-blue-900 font-black text-lg">정보를 입력해주세요.</div>
            <button id="submitBtn" onclick="submitReservation()" class="w-full md:w-auto bg-blue-900 text-white px-10 py-4 rounded-2xl font-black">예약 확정하기</button>
        </div>
    </div>
</body>
</html>
