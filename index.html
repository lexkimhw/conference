<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>렉스김어학원 간담회 예약 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; word-break: keep-all; }
        .step-inactive { opacity: 0.2; pointer-events: none; filter: grayscale(1); transition: all 0.4s; }
        .time-slot { transition: all 0.2s; border: 1px solid #e2e8f0; }
        .available { background-color: #f8fafc; cursor: pointer; color: #1e293b; }
        .available:hover { background-color: #1e3a8a; color: white; border-color: #1e3a8a; }
        .reserved { background-color: #cbd5e1 !important; color: #94a3b8 !important; cursor: not-allowed !important; pointer-events: none !important; border: none !important; }
        .my-choice { background-color: #1e3a8a !important; color: white !important; font-weight: 900; }
        .timeline-bar { height: 24px; display: flex; border-radius: 4px; overflow: hidden; background: #f1f5f9; border: 1px solid #e2e8f0; }
        .timeline-cell { flex: 1; height: 100%; border-right: 1px solid rgba(255,255,255,0.3); position: relative; }
        .cell-reserved { background-color: #ef4444; }
        .cell-free { background-color: #10b981; }
    </style>
</head>
<body id="capture-area" class="bg-slate-50 min-h-screen pb-40">

    <header class="bg-blue-900 text-white p-5 shadow-xl flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-xl font-black tracking-tighter">LEX KIM ACADEMY</h1>
        <div class="flex gap-2">
            <button onclick="resetAll()" class="text-[10px] font-bold bg-red-500 px-3 py-1.5 rounded-full hover:bg-red-600 transition text-white">초기화</button>
            <button onclick="openAdmin()" class="text-[10px] font-bold bg-white/10 px-3 py-1.5 rounded-full hover:bg-white/20 transition text-white">ADMIN</button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-6">
        <section class="bg-white p-6 rounded-3xl shadow-sm mb-8 border border-slate-200 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-2 h-full bg-amber-400"></div>
            <div id="displayNotice" class="text-slate-700 text-sm leading-relaxed whitespace-pre-wrap font-medium">로딩 중...</div>
        </section>

        <section class="mb-10">
            <h2 class="text-xs font-black text-blue-900 mb-4 flex items-center uppercase tracking-widest">
                <span class="w-5 h-5 bg-blue-900 text-white rounded flex items-center justify-center mr-2 text-[10px]">01</span>
                간담회 일정 선택
            </h2>
            <div id="dateList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </section>

        <section id="step2Section" class="mb-10 step-inactive">
            <h2 class="text-xs font-black text-blue-900 mb-4 flex items-center uppercase tracking-widest">
                <span class="w-5 h-5 bg-blue-900 text-white rounded flex items-center justify-center mr-2 text-[10px]">02</span>
                학생 및 부모님 정보
            </h2>
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 grid grid-cols-1 md:grid-cols-3 gap-6">
                <input type="text" id="stuLevel" oninput="checkStep2()" placeholder="레벨" class="border-b-2 border-slate-100 p-2 outline-none focus:border-blue-900 font-bold text-lg text-center">
                <input type="text" id="stuKrName" oninput="checkStep2()" placeholder="학생 한글 이름" class="border-b-2 border-slate-100 p-2 outline-none focus:border-blue-900 font-bold text-lg text-center">
                <input type="tel" id="parentPhone" oninput="checkStep2()" placeholder="부모님 휴대폰" class="border-b-2 border-slate-100 p-2 outline-none focus:border-blue-900 font-bold text-lg text-center">
            </div>
        </section>

        <section id="step3Section" class="mb-10 step-inactive">
            <h2 class="text-xs font-black text-blue-900 mb-4 flex items-center uppercase tracking-widest">
                <span class="w-5 h-5 bg-blue-900 text-white rounded flex items-center justify-center mr-2 text-[10px]">03</span>
                상담 선생님 선택 (최대 2명)
            </h2>
            <div id="teacherList" class="grid grid-cols-2 md:grid-cols-3 gap-3"></div>
        </section>

        <section id="step4Section" class="bg-slate-900 p-8 rounded-[2rem] shadow-2xl mb-10 hidden">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <span id="displayTargetDate" class="text-[10px] font-black text-blue-400 border border-blue-400/30 px-3 py-1 rounded-full"></span>
                    <h3 id="displayTeacherName" class="text-3xl font-black text-white mt-2"></h3>
                    <div id="displayTeacherLevels" class="flex flex-wrap gap-2 mt-4"></div>
                </div>
                <button onclick="document.getElementById('step4Section').classList.add('hidden')" class="text-white/30 hover:text-white text-3xl">&times;</button>
            </div>
            <div id="timeGrid" class="grid grid-cols-4 md:grid-cols-8 gap-2 text-white"></div>
        </section>

        <button onclick="captureScreen()" class="w-full bg-slate-200 text-slate-600 py-4 rounded-2xl font-black text-sm hover:bg-slate-300 transition flex items-center justify-center gap-2">
            📷 예약 화면 캡쳐(저장)
        </button>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t p-6 z-40 shadow-2xl">
        <div class="max-w-4xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div id="selectionSummary" class="text-blue-900 font-black text-lg">정보를 입력해 주세요.</div>
            <button onclick="submitReservation()" class="w-full md:w-auto bg-blue-900 text-white px-10 py-4 rounded-2xl font-black shadow-lg hover:bg-blue-800 transition">예약 확정</button>
        </div>
    </div>

    <div id="adminModal" class="fixed inset-0 bg-slate-900/95 hidden z-[100] flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-white w-full max-w-6xl rounded-[2.5rem] overflow-hidden shadow-2xl flex flex-col my-8">
            <div class="p-6 border-b flex justify-between items-center bg-slate-100">
                <h2 class="text-xl font-black italic">ADMIN CONSOLE (TOTAL CONTROL)</h2>
                <button onclick="closeAdmin()" class="text-2xl">&times;</button>
            </div>
            
            <div class="p-8 space-y-12">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="bg-slate-50 p-6 rounded-3xl border">
                        <h3 class="font-black mb-4 text-blue-900">📢 상단 공지사항 수정</h3>
                        <textarea id="adminNoticeInput" class="w-full h-32 p-4 rounded-xl border mb-3 text-sm" placeholder="공지 내용을 입력하세요"></textarea>
                        <button onclick="updateNotice()" class="w-full bg-blue-900 text-white py-3 rounded-xl font-bold">공지 내용 저장</button>
                    </div>
                    <div class="bg-slate-50 p-6 rounded-3xl border">
                        <h3 class="font-black mb-4 text-blue-900">📅 간담회 일정(회차) 관리</h3>
                        <div class="flex gap-2 mb-4">
                            <input type="text" id="newDateName" placeholder="예: 3차 : 5월 23일" class="flex-1 p-2 rounded-lg border text-sm">
                            <input type="text" id="newDateDesc" placeholder="예: 초등 전체" class="flex-1 p-2 rounded-lg border text-sm">
                            <button onclick="addDate()" class="bg-green-600 text-white px-4 rounded-lg font-bold">추가</button>
                        </div>
                        <div id="adminDateList" class="space-y-2 max-h-32 overflow-y-auto"></div>
                    </div>
                </div>

                <div class="bg-slate-50 p-6 rounded-3xl border">
                    <h3 class="font-black mb-4 text-blue-900">👨‍🏫 상담 선생님 목록 관리</h3>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="newTeacherName" placeholder="선생님 성함" class="flex-1 p-2 rounded-lg border text-sm">
                        <input type="text" id="newTeacherLevels" placeholder="담당 레벨 (쉼표 구분)" class="flex-1 p-2 rounded-lg border text-sm">
                        <button onclick="addTeacher()" class="bg-green-600 text-white px-6 rounded-lg font-bold">선생님 추가</button>
                    </div>
                    <div id="adminTeacherList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 max-h-48 overflow-y-auto"></div>
                </div>

                <section>
                    <h3 class="font-black text-lg text-blue-900 mb-4">📊 실시간 예약 타임라인</h3>
                    <div id="visualChart" class="space-y-4 bg-slate-50 p-6 rounded-3xl border"></div>
                </section>

                <section>
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-black text-lg text-blue-900">📋 전체 예약 데이터</h3>
                        <button onclick="exportToExcel()" class="bg-green-600 text-white px-4 py-2 rounded-xl text-xs font-bold">EXCEL 다운로드</button>
                    </div>
                    <div class="overflow-x-auto border rounded-2xl shadow-sm">
                        <table class="w-full text-[11px] text-left border-collapse" id="adminTable">
                            <thead class="bg-slate-100 border-b font-bold">
                                <tr>
                                    <th class="p-3">회차</th><th class="p-3">레벨</th><th class="p-3">이름</th>
                                    <th class="p-3">연락처</th><th class="p-3">선생님</th><th class="p-3">시간</th>
                                    <th class="p-3 text-center">삭제</th>
                                </tr>
                            </thead>
                            <tbody id="adminBody" class="divide-y bg-white"></tbody>
                        </table>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://lexkimhw-63c3b-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let selection = { date: '', level: '', krName: '', parentPhone: '', items: [] };
        
        // --- 1. 초기 데이터 로딩 (사용자 화면) ---
        function initApp() {
            // 공지사항 로드
            db.ref('settings/notice').on('value', snap => {
                document.getElementById('displayNotice').innerText = snap.val() || "공지사항이 없습니다.";
            });

            // 일정(회차) 로드
            db.ref('settings/dates').on('value', snap => {
                const dates = snap.val() || {};
                const container = document.getElementById('dateList');
                container.innerHTML = '';
                Object.keys(dates).forEach(key => {
                    const d = dates[key];
                    const btn = document.createElement('button');
                    btn.id = `dateBtn_${key}`;
                    btn.className = "p-6 border-2 border-white rounded-3xl text-left bg-white shadow-sm transition-all hover:shadow-md";
                    btn.innerHTML = `<div class="font-black text-slate-800 text-xl">${d.name}</div><div class="text-xs text-slate-500 font-bold">${d.desc}</div>`;
                    btn.onclick = () => {
                        selection.date = d.name;
                        document.querySelectorAll('#dateList button').forEach(b => b.classList.remove('selected-btn', 'bg-blue-50', 'border-blue-900'));
                        btn.classList.add('selected-btn', 'bg-blue-50', 'border-blue-900');
                        document.getElementById('step2Section').classList.remove('step-inactive');
                        updateSummary();
                    };
                    container.appendChild(btn);
                });
            });

            // 선생님 로드
            db.ref('settings/teachers').on('value', snap => {
                const teachers = snap.val() || {};
                window.currentTeachers = teachers; // 글로벌 저장
                if(selection.level && selection.krName) renderTeachers();
            });
        }

        // --- 2. 관리자 제어 함수들 ---
        function updateNotice() {
            const txt = document.getElementById('adminNoticeInput').value;
            db.ref('settings/notice').set(txt).then(() => alert("공지사항이 수정되었습니다."));
        }

        function addDate() {
            const name = document.getElementById('newDateName').value;
            const desc = document.getElementById('newDateDesc').value;
            if(!name) return alert("일정 명칭을 입력하세요.");
            db.ref('settings/dates').push({ name, desc }).then(() => {
                document.getElementById('newDateName').value = '';
                document.getElementById('newDateDesc').value = '';
            });
        }

        function addTeacher() {
            const name = document.getElementById('newTeacherName').value;
            const lvls = document.getElementById('newTeacherLevels').value.split(',').map(s => s.trim());
            if(!name) return alert("선생님 성함을 입력하세요.");
            db.ref('settings/teachers').push({ name, levels: lvls }).then(() => {
                document.getElementById('newTeacherName').value = '';
                document.getElementById('newTeacherLevels').value = '';
            });
        }

        function refreshAdminControls() {
            // 관리자용 일정 리스트
            db.ref('settings/dates').on('value', snap => {
                const list = document.getElementById('adminDateList');
                list.innerHTML = '';
                const data = snap.val() || {};
                Object.keys(data).forEach(key => {
                    list.innerHTML += `<div class="flex justify-between items-center bg-white p-2 rounded border text-xs">
                        <span><b>${data[key].name}</b> (${data[key].desc})</span>
                        <button onclick="db.ref('settings/dates/${key}').remove()" class="text-red-500 font-bold">삭제</button>
                    </div>`;
                });
            });

            // 관리자용 선생님 리스트
            db.ref('settings/teachers').on('value', snap => {
                const list = document.getElementById('adminTeacherList');
                list.innerHTML = '';
                const data = snap.val() || {};
                Object.keys(data).forEach(key => {
                    list.innerHTML += `<div class="bg-white p-3 rounded-xl border text-xs">
                        <div class="font-black text-blue-900">${data[key].name}</div>
                        <div class="text-slate-400 mb-2">${data[key].levels.join(', ')}</div>
                        <button onclick="db.ref('settings/teachers/${key}').remove()" class="w-full bg-red-50 py-1 text-red-500 rounded font-bold">삭제</button>
                    </div>`;
                });
            });
        }

        // --- 3. 기존 기능 유지 및 연동 ---
        function renderTeachers() {
            const list = document.getElementById('teacherList');
            list.innerHTML = '';
            const data = window.currentTeachers || {};
            Object.keys(data).forEach(key => {
                const t = data[key];
                const hasReserved = selection.items.some(i => i.teacher === t.name);
                const btn = document.createElement('button');
                btn.className = `p-5 rounded-2xl font-black text-sm border-2 ${hasReserved ? 'bg-blue-900 text-white' : 'bg-white text-slate-700'}`;
                btn.innerHTML = `${t.name}<br><span class="text-[9px] opacity-50 font-normal uppercase">${hasReserved ? '완료' : '선택'}</span>`;
                btn.onclick = () => openSlots(t);
                list.appendChild(btn);
            });
        }

        function openSlots(teacher) {
            const s4 = document.getElementById('step4Section');
            s4.classList.remove('hidden');
            document.getElementById('displayTeacherName').innerText = teacher.name;
            document.getElementById('displayTargetDate').innerText = selection.date;
            const lvlBox = document.getElementById('displayTeacherLevels');
            lvlBox.innerHTML = '';
            teacher.levels.forEach(l => lvlBox.innerHTML += `<span class="bg-blue-400 text-blue-900 text-[10px] px-2 py-1 rounded-md font-black">${l}</span>`);
            
            const grid = document.getElementById('timeGrid');
            grid.innerHTML = '';
            let curr = new Date(); curr.setHours(10, 20, 0, 0);
            const end = new Date(); end.setHours(12, 55, 0, 0);
            while(curr <= end) {
                const tStr = curr.toLocaleTimeString('ko-KR', { hour12: false, hour: '2-digit', minute: '2-digit' });
                const slot = document.createElement('button');
                slot.className = "time-slot p-2 text-center text-[10px] font-bold rounded-lg available shadow-sm";
                slot.innerText = tStr;
                slot.onclick = () => confirmTime(teacher.name, tStr);
                grid.appendChild(slot);
                curr.setMinutes(curr.setMinutes() + 5);
            }
            listenToReservations(teacher.name);
            s4.scrollIntoView({ behavior: 'smooth' });
        }

        // (이하 중복 방지, 캡쳐, 엑셀 기능 등 기존 코드와 동일)
        function listenToReservations(tName) {
            db.ref('appointments').on('value', snap => {
                const data = snap.val() || {};
                const slots = document.querySelectorAll('.time-slot');
                slots.forEach(slot => {
                    const time = slot.innerText;
                    const isReserved = Object.values(data).some(app => app.date === selection.date && app.items && app.items.some(i => i.teacher === tName && i.time === time));
                    const isMy = selection.items.find(i => i.teacher === tName && i.time === time);
                    if(isReserved && !isMy) slot.classList.add('reserved');
                    else if(isMy) slot.classList.add('my-choice');
                    else slot.classList.remove('reserved', 'my-choice');
                });
            });
        }

        function checkStep2() {
            selection.level = document.getElementById('stuLevel').value.trim();
            selection.krName = document.getElementById('stuKrName').value.trim();
            selection.parentPhone = document.getElementById('parentPhone').value.trim();
            if(selection.level && selection.krName && selection.parentPhone) {
                document.getElementById('step3Section').classList.remove('step-inactive');
                renderTeachers();
            }
            updateSummary();
        }

        function confirmTime(tName, time) {
            const idx = selection.items.findIndex(i => i.teacher === tName);
            if(idx > -1) selection.items.splice(idx, 1);
            if(selection.items.length >= 2) return alert("최대 2명까지만 가능합니다.");
            selection.items.push({ teacher: tName, time: time });
            document.getElementById('step4Section').classList.add('hidden');
            renderTeachers(); updateSummary();
        }

        function updateSummary() {
            const s = document.getElementById('selectionSummary');
            if(!selection.date) return s.innerText = "일정을 선택해 주세요.";
            s.innerText = `${selection.date} | ${selection.krName || '...'} | ${selection.items.map(i => i.teacher+'('+i.time+')').join(', ')}`;
        }

        function submitReservation() {
            if(selection.items.length === 0) return alert("상담 시간을 선택해 주세요.");
            db.ref('appointments').push(selection).then(() => alert("예약 확정!"));
        }

        function openAdmin() {
            if(prompt("ADMIN PW") === '5556575') {
                document.getElementById('adminModal').classList.remove('hidden');
                refreshAdminControls();
                refreshAdminVisuals();
            }
        }
        function closeAdmin() { document.getElementById('adminModal').classList.add('hidden'); }

        function refreshAdminVisuals() {
            db.ref('appointments').on('value', snap => {
                const data = snap.val() || {};
                // 리스트
                const b = document.getElementById('adminBody'); b.innerHTML = '';
                Object.keys(data).forEach(k => {
                    const a = data[k]; if(!a.items) return;
                    a.items.forEach(i => {
                        b.innerHTML += `<tr><td class="p-3 border">${a.date}</td><td class="p-3 border">${a.level}</td><td class="p-3 border font-bold">${a.krName}</td><td class="p-3 border">${a.parentPhone}</td><td class="p-3 border text-blue-700 font-bold">${i.teacher}</td><td class="p-3 border font-black">${i.time}</td><td class="p-3 border text-center"><button onclick="db.ref('appointments/${k}').remove()" class="text-red-500">삭제</button></td></tr>`;
                    });
                });
                // 그래프
                const v = document.getElementById('visualChart'); v.innerHTML = '';
                const teachers = window.currentTeachers || {};
                Object.values(teachers).forEach(t => {
                    let h = `<div class="flex items-center gap-2"><div class="w-24 font-black text-xs text-slate-600">${t.name}</div><div class="timeline-bar flex-1">`;
                    let c = new Date(); c.setHours(10, 20, 0, 0);
                    while(c <= new Date().setHours(12, 55, 0, 0)) {
                        const ts = new Date(c).toLocaleTimeString('ko-KR', { hour12: false, hour: '2-digit', minute: '2-digit' });
                        const r = Object.values(data).some(app => app.items && app.items.some(i => i.teacher === t.name && i.time === ts));
                        h += `<div class="timeline-cell ${r ? 'cell-reserved' : 'cell-free'}" title="${ts}"></div>`;
                        c.setMinutes(c.getMinutes() + 5);
                    }
                    v.innerHTML += h + `</div></div>`;
                });
            });
        }

        function resetAll() { if(confirm("초기화?")) location.reload(); }
        function exportToExcel() { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById('adminTable')), "REXKIM_ADMIN.xlsx"); }
        function captureScreen() {
            html2canvas(document.querySelector("#capture-area")).then(canvas => {
                const a = document.createElement('a'); a.download = `예약확인.png`; a.href = canvas.toDataURL(); a.click();
            });
        }

        // 앱 시작
        initApp();
    </script>
</body>
</html>
