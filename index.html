<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>렉스김어학원 간담회 예약 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .step-inactive { opacity: 0.3; pointer-events: none; filter: grayscale(1); transition: all 0.5s; }
        .step-active { opacity: 1; pointer-events: auto; filter: none; }
        .time-slot { transition: all 0.2s; }
        .available { background-color: #f3f4f6; cursor: pointer; border: 1px solid #d1d5db; }
        .available:hover { background-color: #d1d5db; border-color: #9ca3af; }
        .selected-date { border: 4px solid #1e3a8a !important; background-color: #eff6ff !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <header class="bg-blue-900 text-white p-5 shadow-lg flex justify-between items-center sticky top-0 z-40">
        <h1 class="text-xl font-black tracking-tight">LEX KIM ACADEMY</h1>
        <button onclick="openAdmin()" class="text-xs bg-white/20 px-3 py-1.5 rounded-lg hover:bg-white/30 transition">관리자 모드</button>
    </header>

    <main class="max-w-4xl mx-auto p-6 pb-32">
        
        <section class="bg-white p-6 rounded-2xl shadow-sm mb-6 border border-slate-200">
            <div id="noticeContent" class="mb-6 p-4 bg-amber-50 border-l-4 border-amber-400 text-amber-900 text-sm leading-relaxed whitespace-pre-wrap">
                간담회 일정은 1,2차로 나누어서 진행합니다. 만약 형제가 요일이 다를 경우 올 수 있는 요일 클릭후 문자(010-4967-7807)로 보내 주시기 바랍니다.
            </div>
            
            <h2 class="text-sm font-bold text-slate-400 mb-4 flex items-center">
                <span class="w-6 h-6 bg-blue-900 text-white rounded-full flex items-center justify-center mr-2 text-xs">1</span>
                간담회 일정을 선택해 주세요
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <button onclick="selectStep1('1차')" id="dateBtn1" class="p-4 border-2 border-slate-100 rounded-xl text-left hover:border-blue-300 transition-all bg-slate-50">
                    <div class="font-black text-blue-900 text-lg">1차 : 5월 21일 (목)</div>
                    <div class="text-sm text-slate-500">초등 2학년 ~ 3학년 학부모님</div>
                </button>
                <button onclick="selectStep1('2차')" id="dateBtn2" class="p-4 border-2 border-slate-100 rounded-xl text-left hover:border-blue-300 transition-all bg-slate-50">
                    <div class="font-black text-blue-900 text-lg">2차 : 5월 22일 (금)</div>
                    <div class="text-sm text-slate-500">초등 4학년 ~ 6학년 학부모님</div>
                </button>
            </div>
        </section>

        <section id="step2Section" class="bg-white p-6 rounded-2xl shadow-sm mb-6 border border-slate-200 step-inactive">
            <h2 class="text-sm font-bold text-slate-400 mb-4 flex items-center">
                <span class="w-6 h-6 bg-blue-900 text-white rounded-full flex items-center justify-center mr-2 text-xs">2</span>
                학생 정보를 입력해 주세요
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="stuLevel" oninput="checkStep2()" placeholder="레벨 (예: 3A)" class="border-2 p-3 rounded-xl focus:border-blue-500 outline-none">
                <input type="text" id="stuKrName" oninput="checkStep2()" placeholder="한글 이름" class="border-2 p-3 rounded-xl focus:border-blue-500 outline-none">
                <input type="text" id="stuEnName" oninput="checkStep2()" placeholder="영어 이름" class="border-2 p-3 rounded-xl focus:border-blue-500 outline-none">
            </div>
        </section>

        <section id="step3Section" class="bg-white p-6 rounded-2xl shadow-sm mb-6 border border-slate-200 step-inactive">
            <h2 class="text-sm font-bold text-slate-400 mb-4 flex items-center">
                <span class="w-6 h-6 bg-blue-900 text-white rounded-full flex items-center justify-center mr-2 text-xs">3</span>
                상담하실 선생님을 선택해 주세요 (최대 2명)
            </h2>
            <div id="teacherList" class="grid grid-cols-2 md:grid-cols-3 gap-3">
                </div>
        </section>

        <section id="step4Section" class="bg-white p-6 rounded-2xl shadow-lg mb-6 border-t-4 border-blue-900 hidden">
            <div class="flex justify-between items-end mb-4 border-b pb-2">
                <div>
                    <span id="displayTargetDate" class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded"></span>
                    <h3 id="displayTeacherName" class="text-2xl font-black text-slate-800 mt-1"></h3>
                </div>
                <div id="displayTeacherLevels" class="flex gap-1"></div>
            </div>
            <div id="timeGrid" class="grid grid-cols-4 md:grid-cols-8 gap-2">
                </div>
        </section>

    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 shadow-[0_-10px_20px_rgba(0,0,0,0.05)] z-40">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">나의 선택 정보</p>
                <div id="selectionSummary" class="text-sm font-bold text-blue-900 italic">일정을 먼저 선택해 주세요.</div>
            </div>
            <button onclick="submitReservation()" class="bg-blue-900 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-800 shadow-lg transition-transform active:scale-95">예약 확정</button>
        </div>
    </div>

    <div id="adminModal" class="fixed inset-0 bg-slate-900/80 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-5xl rounded-3xl overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
            <div class="p-6 border-b flex justify-between items-center bg-slate-50">
                <h2 class="text-xl font-black text-slate-800 italic">ADMIN DASHBOARD</h2>
                <button onclick="closeAdmin()" class="text-2xl font-bold">&times;</button>
            </div>
            <div class="p-6 overflow-y-auto flex-1 grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="space-y-4">
                    <h3 class="font-bold text-blue-800 border-b pb-2 italic underline">1. 공지 내용 수정</h3>
                    <textarea id="editNotice" class="w-full h-32 border p-3 rounded-xl text-sm outline-none focus:ring-2 ring-blue-100"></textarea>
                    <button onclick="updateNotice()" class="w-full bg-slate-800 text-white p-3 rounded-xl text-sm font-bold">공지 업데이트</button>

                    <h3 class="font-bold text-blue-800 border-b pb-2 pt-4 italic underline">2. 선생님 추가</h3>
                    <input type="text" id="addTName" placeholder="선생님 이름" class="w-full border p-2 rounded-lg text-sm mb-2">
                    <input type="text" id="addTLevels" placeholder="레벨 (쉼표 구분)" class="w-full border p-2 rounded-lg text-sm">
                    <button onclick="addTeacher()" class="w-full bg-blue-600 text-white p-3 rounded-xl text-sm font-bold mt-2">선생님 등록</button>
                </div>
                <div class="lg:col-span-2 space-y-4">
                    <div class="flex justify-between items-center border-b pb-2">
                        <h3 class="font-bold text-blue-800 italic underline">3. 실시간 예약/선생님 리스트</h3>
                        <button onclick="exportToExcel()" class="text-[10px] bg-green-600 text-white px-2 py-1 rounded">EXCEL</button>
                    </div>
                    <table class="w-full text-[11px] border-collapse">
                        <thead class="bg-slate-100 uppercase font-bold text-slate-500">
                            <tr>
                                <th class="p-2 border">구분</th>
                                <th class="p-2 border">이름/내용</th>
                                <th class="p-2 border">상세/레벨</th>
                                <th class="p-2 border">삭제</th>
                            </tr>
                        </thead>
                        <tbody id="adminBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. 초기화 및 상태 관리
        const firebaseConfig = { databaseURL: "https://lexkimhw-63c3b-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentSelection = { date: '', level: '', krName: '', enName: '', reservations: [] };
        let teacherData = [
            { name: "Ms. Conroy", levels: ["3A-W", "3H-R"] },
            { name: "Ms. Hehn", levels: ["4K-W", "4L-R"] },
            { name: "Ms. Jackson", levels: ["5M-W", "5N-R"] },
            { name: "Ms. Love", levels: ["2S-W", "3A-S"] },
            { name: "Ms. Portewig", levels: ["6P-W", "5Q-W"] },
            { name: "Ms. Proper", levels: ["3J-S", "4J-W"] }
        ];

        // 2. 1단계: 일정 선택 로직
        function selectStep1(round) {
            currentSelection.date = round;
            document.getElementById('dateBtn1').classList.toggle('selected-date', round === '1차');
            document.getElementById('dateBtn2').classList.toggle('selected-date', round === '2차');
            
            document.getElementById('step2Section').classList.remove('step-inactive');
            updateSummary();
            // 일정이 바뀌면 기존 예약 초기화 (시간대가 다를 수 있으므로)
            currentSelection.reservations = [];
            document.getElementById('step4Section').classList.add('hidden');
        }

        // 3. 2단계: 입력 체크 및 3단계 활성화
        function checkStep2() {
            currentSelection.level = document.getElementById('stuLevel').value.trim();
            currentSelection.krName = document.getElementById('stuKrName').value.trim();
            currentSelection.enName = document.getElementById('stuEnName').value.trim();

            const isComplete = currentSelection.level && currentSelection.krName && currentSelection.enName;
            const section3 = document.getElementById('step3Section');
            
            if(isComplete) {
                section3.classList.remove('step-inactive');
                renderTeachers();
            } else {
                section3.classList.add('step-inactive');
            }
            updateSummary();
        }

        // 4. 3단계: 선생님 목록 렌더링
        function renderTeachers() {
            const list = document.getElementById('teacherList');
            list.innerHTML = '';
            teacherData.forEach(t => {
                const btn = document.createElement('button');
                btn.className = "p-4 bg-white border-2 border-slate-100 rounded-xl font-bold text-slate-700 hover:border-blue-900 transition shadow-sm";
                btn.innerText = t.name;
                btn.onclick = () => showTimeSlots(t);
                list.appendChild(btn);
            });
        }

        // 5. 4단계: 5분 단위 시간 생성 (일정별 다르게 세팅 가능)
        function showTimeSlots(teacher) {
            const section4 = document.getElementById('step4Section');
            section4.classList.remove('hidden');
            document.getElementById('displayTeacherName').innerText = teacher.name;
            document.getElementById('displayTargetDate').innerText = currentSelection.date + " 스케줄";
            
            const levelBox = document.getElementById('displayTeacherLevels');
            levelBox.innerHTML = '';
            teacher.levels.forEach(l => {
                levelBox.innerHTML += `<span class="bg-slate-800 text-white text-[10px] px-2 py-0.5 rounded font-black italic">${l}</span>`;
            });

            const grid = document.getElementById('timeGrid');
            grid.innerHTML = '';
            
            // 날짜 세팅 (1차: 21일, 2차: 22일)
            const day = currentSelection.date === '1차' ? 21 : 22;
            let start = new Date(2026, 4, day, 10, 15);
            const end = new Date(2026, 4, day, 13, 0);

            while(start <= end) {
                const timeStr = start.toLocaleTimeString('ko-KR', { hour12: false, hour: '2-digit', minute: '2-digit' });
                const slot = document.createElement('div');
                slot.className = "time-slot p-2 text-center text-xs font-bold rounded available";
                slot.innerText = timeStr;
                slot.onclick = () => handleSelectTime(teacher.name, timeStr);
                grid.appendChild(slot);
                start.setMinutes(start.getMinutes() + 5);
            }
            section4.scrollIntoView({ behavior: 'smooth' });
        }

        function handleSelectTime(tName, time) {
            if(currentSelection.reservations.length >= 2) return alert("최대 2명의 선생님까지만 예약 가능합니다.");
            const exists = currentSelection.reservations.find(r => r.teacher === tName);
            if(exists) return alert("이미 이 선생님과 예약이 되어 있습니다.");

            currentSelection.reservations.push({ teacher: tName, time: time });
            updateSummary();
            alert(`${tName} 선생님 (${time}) 선택 완료`);
        }

        function updateSummary() {
            const summary = document.getElementById('selectionSummary');
            if(!currentSelection.date) {
                summary.innerText = "일정을 먼저 선택해 주세요.";
                return;
            }
            let text = `${currentSelection.date} | ${currentSelection.krName || '...'} (${currentSelection.level || '...'}) `;
            if(currentSelection.reservations.length > 0) {
                text += " | " + currentSelection.reservations.map(r => `${r.teacher}(${r.time})`).join(', ');
            }
            summary.innerText = text;
        }

        // 6. 관리자 모드 로직
        function openAdmin() {
            if(prompt("관리자 비밀번호를 입력하세요.") === '5556575') {
                document.getElementById('adminModal').classList.remove('hidden');
                document.getElementById('editNotice').value = document.getElementById('noticeContent').innerText;
                refreshAdminList();
            } else {
                alert("비밀번호 불일치");
            }
        }

        function closeAdmin() { document.getElementById('adminModal').classList.add('hidden'); }

        function updateNotice() {
            const newText = document.getElementById('editNotice').value;
            document.getElementById('noticeContent').innerText = newText;
            alert("공지가 변경되었습니다.");
        }

        function addTeacher() {
            const name = document.getElementById('addTName').value;
            const lvls = document.getElementById('addTLevels').value;
            if(!name || !lvls) return;
            teacherData.push({ name: name, levels: lvls.split(',').map(s => s.trim()) });
            refreshAdminList();
            renderTeachers();
        }

        function refreshAdminList() {
            const body = document.getElementById('adminBody');
            body.innerHTML = '';
            teacherData.forEach((t, idx) => {
                body.innerHTML += `
                    <tr>
                        <td class="p-2 border text-blue-600 font-bold">선생님</td>
                        <td class="p-2 border">${t.name}</td>
                        <td class="p-2 border text-slate-400">${t.levels.join(',')}</td>
                        <td class="p-2 border text-center"><button onclick="teacherData.splice(${idx},1);refreshAdminList();renderTeachers();" class="text-red-500 font-bold">삭제</button></td>
                    </tr>`;
            });
        }

        function submitReservation() {
            if(!currentSelection.date || currentSelection.reservations.length === 0) return alert("필수 정보를 모두 선택/입력해 주세요.");
            alert("예약이 완료되었습니다! (서버 연동은 Firebase 설정을 완료해 주세요)");
        }

        function exportToExcel() {
            const table = document.querySelector("#adminModal table");
            const wb = XLSX.utils.table_to_book(table);
            XLSX.writeFile(wb, "REXKIM_ADMIN_LIST.xlsx");
        }
    </script>
</body>
</html>
