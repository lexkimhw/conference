<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>렉스김어학원 간담회 예약 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; word-break: keep-all; }
        .step-inactive { opacity: 0.2; pointer-events: none; filter: grayscale(1); transition: all 0.4s; }
        .time-slot { transition: all 0.2s; border: 1px solid #e2e8f0; }
        .available { background-color: #f8fafc; cursor: pointer; color: #1e293b; }
        .available:hover { background-color: #1e3a8a; color: white; border-color: #1e3a8a; }
        .reserved { background-color: #cbd5e1 !important; color: #94a3b8 !important; cursor: not-allowed !important; pointer-events: none !important; border: none !important; }
        
        /* 타임라인 스타일 */
        .timeline-container { position: relative; margin-top: 20px; }
        .timeline-header { display: flex; margin-left: 130px; margin-bottom: 4px; border-bottom: 1px solid #e2e8f0; }
        .timeline-time-label { flex: 1; text-align: center; font-size: 8px; color: #94a3b8; font-weight: bold; min-width: 0; transform: rotate(-45deg); height: 20px; }
        .timeline-row { display: flex; align-items: center; margin-bottom: 8px; }
        .timeline-teacher-name { width: 130px; font-size: 11px; font-weight: 900; color: #1e293b; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 10px; }
        .timeline-bar { flex: 1; height: 18px; display: flex; border-radius: 4px; overflow: hidden; background: #f1f5f9; border: 1px solid #e2e8f0; }
        .timeline-cell { flex: 1; height: 100%; border-right: 1px solid rgba(255,255,255,0.2); }
        .cell-reserved { background-color: #ef4444; }
        .cell-free { background-color: #10b981; }
        
        #adminModalContent::-webkit-scrollbar { width: 8px; }
        #adminModalContent::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* 캡쳐 전용 스타일 */
        .capture-only { display: none; }
        .hidden-for-capture { display: block; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-40">

    <header class="bg-blue-900 text-white p-5 shadow-xl flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-xl font-black tracking-tighter">LEX KIM ACADEMY</h1>
        <div class="flex gap-2">
            <button onclick="resetAll()" class="text-[10px] font-bold bg-red-500 px-3 py-1.5 rounded-full hover:bg-red-600 transition text-white">초기화</button>
            <button onclick="openAdmin()" class="text-[10px] font-bold bg-white/10 px-3 py-1.5 rounded-full hover:bg-white/20 transition text-white">ADMIN</button>
        </div>
    </header>

    <main id="main-content" class="max-w-4xl mx-auto p-6">
        <section class="bg-white p-6 rounded-3xl shadow-sm mb-8 border border-slate-200 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-2 h-full bg-amber-400"></div>
            <div id="displayNotice" class="text-slate-700 text-sm leading-relaxed whitespace-pre-wrap font-medium">불러오는 중...</div>
        </section>

        <div id="dateList" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-10"></div>

        <div id="step2Section" class="step-inactive mb-10">
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 grid grid-cols-1 md:grid-cols-3 gap-6 mb-4">
                <input type="text" id="stuLevel" oninput="this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, ''); checkStep2();" placeholder="레벨 (영문/숫자)" class="border-b-2 border-slate-100 p-2 outline-none focus:border-blue-900 font-bold text-lg text-center">
                <input type="text" id="stuKrName" oninput="checkStep2()" placeholder="학생 이름" class="border-b-2 border-slate-100 p-2 outline-none focus:border-blue-900 font-bold text-lg text-center">
                <input type="tel" id="parentPhone" oninput="checkStep2()" placeholder="연락처" class="border-b-2 border-slate-100 p-2 outline-none focus:border-blue-900 font-bold text-lg text-center">
            </div>

            <div id="existingReservationArea" class="hidden bg-blue-50 border border-blue-200 p-6 rounded-2xl mb-4">
                <h4 class="font-black text-blue-900 mb-2">💡 이미 등록된 예약 정보가 있습니다.</h4>
                <div id="existingDetails" class="text-sm text-slate-700 mb-4"></div>
                <button onclick="prepareEdit()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-blue-700">예약 정보 수정하기</button>
            </div>
        </div>

        <div id="step3Section" class="step-inactive mb-10">
            <div id="teacherList" class="grid grid-cols-2 md:grid-cols-3 gap-3"></div>
        </div>

        <div id="step4Section" class="bg-slate-900 p-8 rounded-[2rem] shadow-2xl mb-10 hidden">
            <div id="timeGrid" class="grid grid-cols-4 md:grid-cols-8 gap-2 text-white"></div>
        </div>

        <div id="captureCard" class="bg-white p-10 rounded-[3rem] shadow-2xl border-4 border-blue-900 hidden">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-black text-blue-900 mb-2">RESERVATION CONFIRMED</h2>
                <p class="text-slate-500 font-bold">렉스김어학원 간담회 예약 확인증</p>
            </div>
            <div class="space-y-4 border-y-2 border-slate-100 py-8">
                <div class="flex justify-between"><span class="font-bold text-slate-400">일정</span><span id="capDate" class="font-black text-xl text-blue-900"></span></div>
                <div class="flex justify-between"><span class="font-bold text-slate-400">학생</span><span id="capStudent" class="font-black text-xl text-blue-900"></span></div>
                <div id="capTeachers" class="space-y-2 pt-4"></div>
            </div>
            <div class="mt-8 text-center text-[10px] text-slate-400 font-bold">본 예약증을 갈무리하여 보관해 주세요.</div>
        </div>
    </main>

    <div id="adminModal" class="fixed inset-0 bg-slate-900/90 hidden z-[100] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-5xl h-[90vh] rounded-[2.5rem] overflow-hidden shadow-2xl flex flex-col">
            <div class="p-6 border-b flex justify-between items-center bg-slate-50 shrink-0">
                <div class="flex items-center gap-4">
                    <h2 class="text-xl font-black italic text-blue-900">ADMIN PANEL</h2>
                    <button onclick="closeAdmin()" class="bg-blue-900 text-white px-5 py-2 rounded-xl text-xs font-bold hover:bg-blue-800 shadow-lg">← 메인화면 이동</button>
                </div>
                <button onclick="closeAdmin()" class="text-3xl text-slate-400">&times;</button>
            </div>
            <div id="adminModalContent" class="p-8 space-y-10 overflow-y-auto bg-white flex-1">
                <div class="bg-blue-50 p-6 rounded-3xl border border-blue-100">
                    <h3 class="font-black mb-4 text-blue-900">📢 공지사항 설정</h3>
                    <textarea id="adminNoticeInput" class="w-full h-24 p-4 rounded-2xl border-2 border-white mb-3 text-sm shadow-inner outline-none focus:border-blue-400"></textarea>
                    <button onclick="updateNotice()" class="w-full bg-blue-900 text-white py-3 rounded-xl font-black">공지 즉시 적용</button>
                </div>
                </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white/95 border-t p-6 z-40 shadow-2xl">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div id="selectionSummary" class="text-blue-900 font-black text-lg">정보를 입력해 주세요.</div>
            <div class="flex gap-2">
                <button id="captureBtn" onclick="captureResult()" class="hidden bg-amber-500 text-white px-6 py-4 rounded-2xl font-black shadow-lg">현황 캡쳐</button>
                <button id="confirmBtn" onclick="submitReservation()" class="bg-blue-900 text-white px-10 py-4 rounded-2xl font-black">예약 확정</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://lexkimhw-63c3b-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let selection = { date: '', level: '', krName: '', parentPhone: '', items: [] };
        let existingKey = null;

        function initApp() {
            db.ref('settings/notice').on('value', snap => {
                const notice = snap.val() || "";
                document.getElementById('displayNotice').innerText = notice;
                document.getElementById('adminNoticeInput').value = notice;
            });
            
            db.ref('settings/dates').on('value', snap => {
                const dates = snap.val() || {};
                const container = document.getElementById('dateList');
                container.innerHTML = '';
                Object.keys(dates).forEach(key => {
                    const d = dates[key];
                    const btn = document.createElement('button');
                    btn.className = "p-6 border-2 border-white rounded-3xl text-left bg-white shadow-sm";
                    btn.innerHTML = `<div class="font-black text-slate-800 text-xl">${d.name}</div><div class="text-xs text-slate-500 font-bold">${d.desc}</div>`;
                    btn.onclick = () => {
                        selection.date = d.name;
                        document.querySelectorAll('#dateList button').forEach(b => b.classList.remove('border-blue-900', 'bg-blue-50'));
                        btn.classList.add('border-blue-900', 'bg-blue-50');
                        document.getElementById('step2Section').classList.remove('step-inactive');
                        checkStep2();
                    };
                    container.appendChild(btn);
                });
            });

            db.ref('settings/teachers').on('value', snap => {
                window.allTeachers = snap.val() || {};
                renderTeachers();
            });
        }

        // 입력 체크 및 기존 예약 확인
        function checkStep2() {
            selection.level = document.getElementById('stuLevel').value.trim();
            selection.krName = document.getElementById('stuKrName').value.trim();
            selection.parentPhone = document.getElementById('parentPhone').value.trim();

            if(selection.level && selection.krName && selection.parentPhone) {
                db.ref('appointments').once('value', snap => {
                    const data = snap.val() || {};
                    existingKey = Object.keys(data).find(k => 
                        data[k].level === selection.level && 
                        data[k].krName === selection.krName && 
                        data[k].parentPhone === selection.parentPhone
                    );

                    if(existingKey) {
                        const app = data[existingKey];
                        document.getElementById('existingReservationArea').classList.remove('hidden');
                        document.getElementById('existingDetails').innerHTML = `
                            <b>예약 회차:</b> ${app.date}<br>
                            <b>상담 내용:</b> ${app.items.map(i => `${i.teacher} (${i.time})`).join(', ')}
                        `;
                    } else {
                        document.getElementById('existingReservationArea').classList.add('hidden');
                    }
                });
                document.getElementById('step3Section').classList.remove('step-inactive');
                renderTeachers();
            }
            updateSummary();
        }

        // 수정 준비
        function prepareEdit() {
            if(!existingKey) return;
            db.ref(`appointments/${existingKey}`).once('value', snap => {
                const app = snap.val();
                selection.items = app.items;
                selection.date = app.date;
                // UI 선택 상태 복구
                document.querySelectorAll('#dateList button').forEach(b => {
                    if(b.innerText.includes(app.date)) b.classList.add('border-blue-900', 'bg-blue-50');
                });
                renderTeachers();
                document.getElementById('step3Section').scrollIntoView({ behavior: 'smooth' });
                alert("기존 예약 내용을 불러왔습니다. 선생님을 다시 클릭하여 시간을 변경할 수 있습니다.");
            });
        }

        function renderTeachers() {
            const list = document.getElementById('teacherList');
            list.innerHTML = '';
            if(!selection.date) return;
            Object.values(window.allTeachers).forEach(t => {
                if(t.dateRef === selection.date) {
                    const item = selection.items.find(i => i.teacher === t.name);
                    const btn = document.createElement('button');
                    btn.className = `p-5 rounded-2xl font-black text-sm border-2 ${item ? 'bg-blue-900 text-white' : 'bg-white text-slate-700'}`;
                    btn.innerHTML = `${t.name}<br><span class="text-[9px] opacity-60 font-normal">${item ? item.time : t.levels.join(',')}</span>`;
                    btn.onclick = () => openSlots(t);
                    list.appendChild(btn);
                }
            });
        }

        function openSlots(teacher) {
            document.getElementById('step4Section').classList.remove('hidden');
            const grid = document.getElementById('timeGrid'); grid.innerHTML = '';
            let c = new Date(); c.setHours(10, 20, 0, 0);
            while(c <= new Date().setHours(12, 55, 0, 0)) {
                const ts = c.toLocaleTimeString('ko-KR', { hour12: false, hour: '2-digit', minute: '2-digit' });
                const slot = document.createElement('button');
                slot.className = "time-slot p-2 text-center text-[10px] font-bold rounded-lg available";
                slot.innerText = ts;
                slot.onclick = () => {
                    const idx = selection.items.findIndex(i => i.teacher === teacher.name);
                    if(idx > -1) selection.items.splice(idx, 1);
                    if(selection.items.length >= 2) return alert("최대 2명까지 선택 가능합니다.");
                    selection.items.push({ teacher: teacher.name, time: ts });
                    document.getElementById('step4Section').classList.add('hidden'); 
                    renderTeachers(); 
                    updateSummary();
                };
                grid.appendChild(slot);
                c.setMinutes(c.getMinutes() + 5);
            }
            // 마감 체크
            db.ref('appointments').on('value', snap => {
                const data = snap.val() || {};
                document.querySelectorAll('.time-slot').forEach(slot => {
                    const r = Object.values(data).some(app => app.date === selection.date && app.items && app.items.some(i => i.teacher === teacher.name && i.time === slot.innerText));
                    if(r) slot.classList.add('reserved');
                });
            });
        }

        function updateSummary() {
            const summary = document.getElementById('selectionSummary');
            if(!selection.date) summary.innerText = "일정을 먼저 선택해 주세요.";
            else if(!selection.krName) summary.innerText = "학생 정보를 입력해 주세요.";
            else summary.innerText = `${selection.krName} | ${selection.items.map(i => `${i.teacher}(${i.time})`).join(', ')}`;
            
            document.getElementById('captureBtn').classList.toggle('hidden', selection.items.length === 0);
        }

        function submitReservation() {
            if(selection.items.length === 0) return alert("상담 시간을 선택해 주세요.");
            const ref = existingKey ? db.ref(`appointments/${existingKey}`) : db.ref('appointments').push();
            ref.set(selection).then(() => {
                alert(existingKey ? "예약이 수정되었습니다." : "예약이 확정되었습니다.");
                location.reload();
            });
        }

        // 캡쳐 기능
        async function captureResult() {
            const card = document.getElementById('captureCard');
            const tDiv = document.getElementById('capTeachers');
            
            document.getElementById('capDate').innerText = selection.date;
            document.getElementById('capStudent').innerText = `${selection.krName} (${selection.level})`;
            tDiv.innerHTML = '';
            selection.items.forEach(i => {
                tDiv.innerHTML += `
                    <div class="flex justify-between bg-slate-50 p-4 rounded-2xl">
                        <span class="font-black text-slate-700">${i.teacher} 선생님</span>
                        <span class="font-black text-blue-600">${i.time}</span>
                    </div>`;
            });

            card.classList.remove('hidden');
            const canvas = await html2canvas(card, { backgroundColor: null, scale: 2 });
            const link = document.createElement('a');
            link.download = `LEXKIM_예약_${selection.krName}.png`;
            link.href = canvas.toDataURL();
            link.click();
            card.classList.add('hidden');
        }

        function openAdmin() { if(prompt("PW")==='5556575') document.getElementById('adminModal').classList.remove('hidden'); }
        function closeAdmin() { document.getElementById('adminModal').classList.add('hidden'); }
        function resetAll() { if(confirm("초기화하시겠습니까?")) location.reload(); }

        initApp();
    </script>
</body>
</html>
