<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>렉스김어학원 - 선생님 상담 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; word-break: keep-all; }
        .checked-row { background-color: #f8fafc; opacity: 0.7; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-12">

    <div id="loginModal" class="fixed inset-0 bg-slate-900/80 z-[200] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2rem] shadow-2xl w-full max-w-md border border-slate-200">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-black text-blue-900">선생님 로그인</h2>
                <p class="text-xs text-slate-400 mt-1">상담 시간표 관리 시스템입니다.</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">선생님 이름</label>
                    <select id="teacherSelect" class="w-full p-3 border rounded-xl font-bold text-slate-800 outline-none focus:border-blue-900">
                        <option value="">선생님 선택</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">비밀번호</label>
                    <input type="password" id="loginPw" placeholder="비밀번호 입력" class="w-full p-3 border rounded-xl outline-none focus:border-blue-900 font-bold">
                </div>
                <button onclick="handleLogin()" class="w-full bg-blue-900 text-white py-3.5 rounded-xl font-black shadow-md hover:bg-blue-800 transition-all">로그인</button>
            </div>
        </div>
    </div>

    <div id="mainContent" class="hidden">
        <header class="bg-blue-900 text-white p-5 shadow-xl flex justify-between items-center sticky top-0 z-50">
            <div>
                <h1 class="text-lg font-black tracking-tighter">렉스김어학원 상담 관리</h1>
                <p id="currentTeacherDisplay" class="text-xs text-blue-300 font-bold mt-0.5"></p>
            </div>
            <button onclick="handleLogout()" class="text-[10px] font-bold bg-white/10 px-3 py-1.5 rounded-full text-white hover:bg-white/20">로그아웃</button>
        </header>

        <main class="max-w-6xl mx-auto p-4 md:p-6">
            <section class="bg-white p-4 rounded-2xl shadow-sm mb-6 border border-slate-200 flex flex-wrap gap-4 items-center justify-between">
                <div class="flex items-center gap-2">
                    <span class="text-xs font-bold text-slate-500">회차 선택:</span>
                    <select id="filterDate" onchange="loadSchedule()" class="p-2 border rounded-xl text-xs font-bold text-slate-700 outline-none focus:border-blue-900">
                        <option value="all">전체 회차 보기</option>
                    </select>
                </div>
                <div class="text-xs font-bold text-slate-400">
                    * 체크박스와 메모는 입력 후 하단의 <span class="text-blue-600">■ 일괄 저장하기</span> 버튼을 눌러야 최종 반영됩니다.
                </div>
            </section>

            <section class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-200 text-slate-600 text-xs font-bold">
                                <th class="p-4 text-center w-16">상태</th>
                                <th class="p-4 w-24">시간</th>
                                <th class="p-4 w-28">회차</th>
                                <th class="p-4 w-20">레벨</th>
                                <th class="p-4 w-32">학생 이름 (영어)</th>
                                <th class="p-4 w-36">학부모 연락처</th>
                                <th class="p-4">상담 간단 메모</th>
                            </tr>
                        </thead>
                        <tbody id="scheduleBody" class="divide-y divide-slate-100 text-sm">
                            <tr>
                                <td colspan="7" class="p-8 text-center text-slate-400 font-bold">데이터를 불러오는 중입니다...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <div class="fixed bottom-0 left-0 right-0 bg-white/95 border-t p-3 z-40 shadow-2xl">
                <div class="max-w-6xl mx-auto flex justify-between items-center">
                    <div id="saveStatus" class="text-slate-500 font-bold text-xs">변경사항을 저장해 주세요.</div>
                    <button onclick="saveAllTeacherData()" class="bg-blue-900 text-white px-8 py-3 rounded-xl text-xs font-black shadow-md hover:bg-blue-800 transition-all">
                        💾 변경사항 일괄 저장하기
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 메인 소스코드와 동일한 Firebase 환경 설정
        const firebaseConfig = { databaseURL: "https://lexkimhw-63c3b-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentTeacher = null;
        let appointmentData = {};
        let teacherCachedList = [];

        // 초기 앱 구동 시 선생님 목록 로드
        function initTeacherApp() {
            db.ref('settings/teachers').once('value', snap => {
                const teachers = snap.val() || {};
                const select = document.getElementById('teacherSelect');
                
                // 중복 제거된 선생님 이름 리스트 생성
                const teacherNames = new Set();
                Object.values(teachers).forEach(t => { if(t.name) teacherNames.add(t.name); });
                teacherCachedList = Array.from(teacherNames).sort();

                teacherCachedList.forEach(name => {
                    const opt = document.createElement('option');
                    opt.value = name;
                    opt.innerText = name + " 선생님";
                    select.appendChild(opt);
                });
            });

            // 회차 리스트 불러오기 (셀렉트 박스 필터용)
            db.ref('settings/dates').once('value', snap => {
                const dates = snap.val() || {};
                const filterDate = document.getElementById('filterDate');
                Object.values(dates).forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.name;
                    opt.innerText = d.name;
                    filterDate.appendChild(opt);
                });
            });
        }

        // 로그인 처리
        function handleLogin() {
            const teacher = document.getElementById('teacherSelect').value;
            const pw = document.getElementById('loginPw').value;

            if(!teacher) return alert("선생님을 선택해 주세요.");
            if(pw !== "0987") return alert("비밀번호가 올바르지 않습니다.");

            currentTeacher = teacher;
            document.getElementById('loginModal').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('currentTeacherDisplay').innerText = `안녕하세요, ${currentTeacher} 선생님`;
            
            // 데이터 구독 시작
            db.ref('appointments').on('value', snap => {
                appointmentData = snap.val() || {};
                loadSchedule();
            });
        }

        // 로그아웃
        function handleLogout() {
            currentTeacher = null;
            document.getElementById('loginPw').value = '';
            document.getElementById('loginModal').classList.remove('hidden');
            document.getElementById('mainContent').classList.add('hidden');
            db.ref('appointments').off();
        }

        // 시간표 로드 및 렌더링
        function loadSchedule() {
            const tbody = document.getElementById('scheduleBody');
            const selectedDateFilter = document.getElementById('filterDate').value;
            tbody.innerHTML = '';

            let listItems = [];

            // 로그인한 선생님의 조건에 일치하는 상담 항목 추출 및 재가공
            Object.keys(appointmentData).forEach(appKey => {
                const app = appointmentData[appKey];
                
                // 회차 필터 검사
                if (selectedDateFilter !== 'all' && app.date !== selectedDateFilter) return;

                if (app.items && Array.isArray(app.items)) {
                    app.items.forEach((item, index) => {
                        if (item.teacher === currentTeacher) {
                            listItems.push({
                                appKey: appKey,
                                itemIndex: index,
                                time: item.time,
                                date: app.date,
                                level: app.level,
                                krName: app.krName,
                                enName: app.enName || '-',
                                parentPhone: app.parentPhone,
                                check: item.check || false, // 기존 체크값 바인딩
                                memo: item.memo || ''       // 기존 메모값 바인딩
                            });
                        }
                    });
                }
            });

            // 상담 시간 기준 오름차순 정렬
            listItems.sort((a, b) => a.time.localeCompare(b.time));

            if (listItems.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="p-8 text-center text-slate-400 font-bold">배정된 예약 일정이 없습니다.</td></tr>`;
                return;
            }

            // 테이블 행 생성
            listItems.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = `border-b border-slate-100 transition-all ${item.check ? 'checked-row' : ''}`;
                tr.setAttribute('data-key', item.appKey);
                tr.setAttribute('data-idx', item.itemIndex);

                tr.innerHTML = `
                    <td class="p-4 text-center">
                        <input type="checkbox" ${item.check ? 'checked' : ''} onchange="toggleRowClass(this)" class="todo-check w-4 h-4 rounded text-blue-900 border-slate-300 focus:ring-blue-900">
                    </td>
                    <td class="p-4 font-bold text-blue-900">${item.time}</td>
                    <td class="p-4 font-medium text-slate-500 text-xs">${item.date}</td>
                    <td class="p-4"><span class="bg-slate-200 text-slate-800 text-xs font-black px-2 py-1 rounded">${item.level}</span></td>
                    <td class="p-4">
                        <div class="font-black text-slate-800">${item.krName}</div>
                        <div class="text-xs text-slate-400 font-semibold">${item.enName}</div>
                    </td>
                    <td class="p-4 text-slate-600 font-mono text-xs">${item.parentPhone}</td>
                    <td class="p-4">
                        <input type="text" value="${item.memo}" placeholder="상담 메모 사항 입력" class="todo-memo w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-xs font-medium outline-none focus:bg-white focus:border-blue-900 transition-all">
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 체크박스 핸들러 (시각효과 피드백)
        function toggleRowClass(checkbox) {
            const tr = checkbox.closest('tr');
            if(checkbox.checked) {
                tr.classList.add('checked-row');
            } else {
                tr.classList.remove('checked-row');
            }
        }

        // 데이터 일괄 저장 로직
        function saveAllTeacherData() {
            const rows = document.querySelectorAll('#scheduleBody tr[data-key]');
            if(rows.length === 0) return alert("저장할 데이터가 없습니다.");

            const updates = {};
            let successCount = 0;

            rows.forEach(row => {
                const appKey = row.getAttribute('data-key');
                const idx = parseInt(row.getAttribute('data-idx'));
                const isChecked = row.querySelector('.todo-check').checked;
                const memoValue = row.querySelector('.todo-memo').value.trim();

                // 기존 로컬 세션의 어포인트먼트 구조 안전 검사 후 업데이트 바인딩
                if(appointmentData[appKey] && appointmentData[appKey].items && appointmentData[appKey].items[idx]) {
                    appointmentData[appKey].items[idx].check = isChecked;
                    appointmentData[appKey].items[idx].memo = memoValue;
                    
                    updates[`/appointments/${appKey}/items/${idx}`] = appointmentData[appKey].items[idx];
                    successCount++;
                }
            });

            // Firebase 멀티 패스 업데이트 수행
            db.ref().update(updates).then(() => {
                const status = document.getElementById('saveStatus');
                status.innerText = "✨ 모든 변경사항이 성공적으로 저장되었습니다!";
                status.classList.remove('text-slate-500');
                status.classList.add('text-green-600');
                
                alert("상담 내역(체크/메모) 저장이 완료되었습니다.");
                
                setTimeout(() => {
                    status.innerText = "변경사항을 저장해 주세요.";
                    status.classList.remove('text-green-600');
                    status.classList.add('text-slate-500');
                }, 3000);
            }).catch(err => {
                console.error(err);
                alert("저장 도중 오류가 발생했습니다. 다시 시도해 주세요.");
            });
        }

        // 초기 구동
        initTeacherApp();
    </script>
</body>
</html>
